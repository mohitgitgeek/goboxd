services:
  goboxd:
    build:
      context: .
      dockerfile: Dockerfile
    image: goboxd:dev
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
